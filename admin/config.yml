backend:
  name: github
  repo: bokar83/hotelclubkipe-site
  branch: master
  base_url: https://sveltia-oauth.bokar83.workers.dev

locale: fr
site_url: https://hotelclubdekipe.com
display_url: https://hotelclubdekipe.com
logo_url: https://hotelclubdekipe.com/images/logo-transparent.png

media_folder: "Photos du Hotel et Club"
public_folder: "Photos du Hotel et Club"

publish_mode: editorial_workflow

collections:
  - name: "site"
    label: "Contenu du Site"
    files:

      - name: "settings"
        label: "Coordonnees et Tarifs des Chambres"
        file: "_data/site.json"
        format: json
        fields:
          - label: "Numero de telephone"
            name: "phone"
            widget: "string"
            hint: "ex. +224 669 69 99 99"
          - label: "Numero WhatsApp"
            name: "whatsapp"
            widget: "string"
            hint: "ex. +224 669 00 09 99"
          - label: "Prix Chambre Standard - 1er etage"
            name: "price_std1"
            widget: "string"
            hint: "ex. 600 000"
          - label: "Prix Chambre Standard - 2e et 3e etage"
            name: "price_std2"
            widget: "string"
            hint: "ex. 800 000"
          - label: "Prix Mini Suite"
            name: "price_mini"
            widget: "string"
            hint: "ex. 1 000 000"
          - label: "Prix Suite"
            name: "price_suite"
            widget: "string"
            hint: "ex. 1 200 000"
          - label: "Devise"
            name: "currency"
            widget: "string"
            hint: "ex. FG"

