<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion | Hotel Club de Kipe</title>
  <link rel="stylesheet" href="css/staff.css">
</head>
<body class="login-body">
  <div class="login-wrap">
    <section class="login-card">
      <div class="login-logo"><img src="../public/images/logo-transparent.png" alt="Hotel Club de Kipe"></div>
      <h1 class="login-title">Portail Personnel</h1>
      <p class="login-sub">Connexion sécurisée de l'équipe hôtel.</p>
      <div id="login-error" class="error-box"></div>
      <form id="login-form">
        <div class="fg"><label for="username">Identifiant</label><input id="username" name="username" autocomplete="username" placeholder="admin / staff" required></div>
        <div class="fg"><label for="password">Mot de passe</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
        <button class="btn-primary btn-block" type="submit">Connexion</button>
      </form>
      <div class="cw-credit" style="margin-top:24px">Built by <a href="https://catalystworks.consulting" target="_blank" rel="noopener">Catalyst Works</a></div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
  document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    var err = document.getElementById('login-error');
    err.className = 'error-box';
    err.textContent = '';
    login(document.getElementById('username').value, document.getElementById('password').value).then(function(){
      window.location.href = 'dashboard.html';
    }).catch(function(error){
      err.textContent = error && error.message ? error.message : 'Identifiant ou mot de passe incorrect.';
      err.className = 'error-box show';
    });
  });
  </script>
</body>
</html>
